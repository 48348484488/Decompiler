name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace 2>&1 | tee build_output.log
          RESULT=${PIPESTATUS[0]}
          if [ "$RESULT" -ne 0 ]; then
            grep -E "error:|Error:|FAILED|error occurred|undefined reference|fatal error|^e: |warning:.*never used" build_output.log | sort -u | head -80 | while IFS= read -r line; do
              safe=$(echo "$line" | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
              echo "::error::${safe}"
            done
            exit $RESULT
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snes-deco-debug-apk
          path: app/build/outputs/apk/debug/*.apk
